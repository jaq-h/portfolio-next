<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowDim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="60" y="70" fill="#fafafa" font-size="36" font-weight="700" letter-spacing="-1">rub3</text>
  <text x="60" y="100" fill="#737373" font-size="15">wallet-native software licensing</text>

  <!-- Developer -->
  <g>
    <rect x="70" y="220" width="240" height="180" rx="8" fill="#171717" stroke="#404040" stroke-width="1.5"/>
    <text x="190" y="255" fill="#a3a3a3" font-size="12" text-anchor="middle" letter-spacing="2">DEVELOPER</text>
    <g transform="translate(190, 300)">
      <rect x="-40" y="-18" width="80" height="36" rx="4" fill="#0a0a0a" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="0" y="5" fill="#8b5cf6" font-size="16" text-anchor="middle" font-weight="600">{ }</text>
    </g>
    <text x="190" y="355" fill="#fafafa" font-size="15" text-anchor="middle">app binary</text>
    <text x="190" y="378" fill="#737373" font-size="12" text-anchor="middle">+ rub3 CLI</text>
  </g>

  <!-- Wrapper -->
  <g>
    <rect x="480" y="180" width="240" height="260" rx="8" fill="#171717" stroke="#8b5cf6" stroke-width="2"/>
    <text x="600" y="215" fill="#a3a3a3" font-size="12" text-anchor="middle" letter-spacing="2">WRAPPER RUNTIME</text>

    <rect x="510" y="240" width="180" height="36" rx="4" fill="#0a0a0a" stroke="#404040"/>
    <text x="600" y="263" fill="#fafafa" font-size="13" text-anchor="middle">signature verify</text>

    <rect x="510" y="286" width="180" height="36" rx="4" fill="#0a0a0a" stroke="#404040"/>
    <text x="600" y="309" fill="#fafafa" font-size="13" text-anchor="middle">ownership check</text>

    <rect x="510" y="332" width="180" height="36" rx="4" fill="#0a0a0a" stroke="#404040"/>
    <text x="600" y="355" fill="#fafafa" font-size="13" text-anchor="middle">session cache</text>

    <text x="600" y="410" fill="#8b5cf6" font-size="13" text-anchor="middle" font-weight="600">launch app</text>
  </g>

  <!-- On-chain License -->
  <g>
    <rect x="890" y="220" width="240" height="180" rx="8" fill="#171717" stroke="#404040" stroke-width="1.5"/>
    <text x="1010" y="255" fill="#a3a3a3" font-size="12" text-anchor="middle" letter-spacing="2">ON-CHAIN LICENSE</text>
    <g transform="translate(1010, 300)">
      <polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="#0a0a0a" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="0" y="5" fill="#8b5cf6" font-size="12" text-anchor="middle" font-weight="600">NFT</text>
    </g>
    <text x="1010" y="355" fill="#fafafa" font-size="15" text-anchor="middle">ERC-721 token</text>
    <text x="1010" y="378" fill="#737373" font-size="12" text-anchor="middle">Base L2</text>
  </g>

  <!-- User / Wallet -->
  <g>
    <rect x="480" y="500" width="240" height="90" rx="8" fill="#171717" stroke="#404040" stroke-width="1.5"/>
    <text x="600" y="530" fill="#a3a3a3" font-size="12" text-anchor="middle" letter-spacing="2">USER WALLET</text>
    <text x="600" y="560" fill="#fafafa" font-size="15" text-anchor="middle">holds NFT · signs session</text>
  </g>

  <!-- Arrows -->
  <!-- Developer -> Wrapper (packages) -->
  <line x1="310" y1="310" x2="478" y2="310" stroke="#525252" stroke-width="1.5" marker-end="url(#arrowDim)"/>
  <text x="394" y="300" fill="#737373" font-size="11" text-anchor="middle">packages</text>

  <!-- Wrapper -> On-chain (verify) -->
  <line x1="722" y1="310" x2="888" y2="310" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="805" y="300" fill="#a3a3a3" font-size="11" text-anchor="middle">verify ownership</text>

  <!-- Wallet -> Wrapper (activate) -->
  <line x1="600" y1="498" x2="600" y2="442" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="615" y="475" fill="#a3a3a3" font-size="11">activate</text>

  <!-- Footer -->
  <text x="60" y="590" fill="#525252" font-size="12">no backend · no password · blockchain is truth</text>
</svg>
